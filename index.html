<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>فهرس بأهم الحوادث المشهورة</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap');
:root{--teal-dark:#073b36;--teal:#0f766e;--teal-soft:#dff7f4;--teal-pale:#f3fffd;--gold:#d8bd73;--gold-soft:#fff3cf;--white:#fff;--shadow:0 24px 70px rgba(7,59,54,.16);--radius:30px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--teal-dark);font-family:'Amiri','Noto Naskh Arabic','Traditional Arabic',Tahoma,Arial,sans-serif;background:radial-gradient(circle at 12% 12%,rgba(15,118,110,.16),transparent 30%),radial-gradient(circle at 86% 10%,rgba(216,189,115,.28),transparent 30%),linear-gradient(135deg,var(--white),var(--teal-pale) 52%,var(--gold-soft));overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;opacity:.48;background-image:repeating-linear-gradient(45deg,rgba(15,118,110,.08) 0 1px,transparent 1px 42px),repeating-linear-gradient(-45deg,rgba(216,189,115,.13) 0 1px,transparent 1px 42px),radial-gradient(circle,rgba(15,118,110,.08) 0 2px,transparent 2px 56px);background-size:84px 84px}.page{width:min(1200px,calc(100% - 30px));margin:auto;padding:34px 0 56px;position:relative;z-index:1}.hero{min-height:58vh;display:grid;place-items:center;padding:34px 12px;text-align:center}.hero-card{width:min(980px,100%);padding:clamp(32px,5vw,78px);border-radius:44px;border:1px solid var(--white);background:linear-gradient(135deg,rgba(255,255,255,.94),rgba(255,255,255,.78)),radial-gradient(circle at 18% 14%,rgba(15,118,110,.14),transparent 34%),radial-gradient(circle at 86% 86%,rgba(216,189,115,.24),transparent 34%);box-shadow:var(--shadow);backdrop-filter:blur(18px);position:relative;overflow:hidden}.hero-card:before{content:"";position:absolute;inset:18px;border-radius:32px;border:2px solid var(--teal-soft);outline:2px solid var(--gold-soft);outline-offset:-9px}.pattern-band{position:absolute;inset-inline:-20px;top:0;height:92px;opacity:.58;background:linear-gradient(90deg,transparent,rgba(15,118,110,.18),rgba(216,189,115,.24),rgba(15,118,110,.18),transparent),repeating-linear-gradient(45deg,transparent 0 22px,rgba(15,118,110,.18) 22px 24px,transparent 24px 46px),repeating-linear-gradient(-45deg,transparent 0 22px,rgba(216,189,115,.28) 22px 24px,transparent 24px 46px)}.web-icons{display:flex;justify-content:center;align-items:center;gap:18px;margin:0 auto 22px;position:relative;z-index:1}.web-icon{width:46px;height:46px;background:var(--teal);opacity:.96;-webkit-mask:var(--icon) center/contain no-repeat;mask:var(--icon) center/contain no-repeat}.web-icon.gold{background:var(--gold);width:60px;height:60px}.mosque{--icon:url('https://api.iconify.design/fa6-solid/mosque.svg')}.moon{--icon:url('https://api.iconify.design/fa6-solid/moon.svg')}.star{--icon:url('https://api.iconify.design/fa6-solid/star.svg')}.basmala{display:inline-grid;place-items:center;padding:10px 25px;border-radius:999px;color:var(--white);background:linear-gradient(135deg,var(--teal-dark),var(--teal));box-shadow:0 14px 28px rgba(15,118,110,.20);font-size:clamp(1.08rem,2vw,1.5rem);margin-bottom:24px;position:relative;z-index:1}.org{display:grid;gap:8px;color:var(--teal);font-size:clamp(1rem,1.7vw,1.22rem);margin-bottom:30px;position:relative;z-index:1}h1{margin:0;color:var(--teal-dark);font-size:clamp(2rem,6vw,4.6rem);line-height:1.25;text-wrap:balance;position:relative;z-index:1}.hero-line{width:min(430px,80%);height:5px;margin:32px auto 0;border-radius:999px;background:linear-gradient(90deg,var(--teal),var(--gold),var(--teal));position:relative;z-index:1}.toolbar{position:sticky;top:12px;z-index:10;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin:6px 0 24px;padding:12px;border-radius:24px;border:1px solid var(--white);background:rgba(255,255,255,.82);box-shadow:0 18px 44px rgba(7,59,54,.12);backdrop-filter:blur(20px)}.searchbox{width:100%;border:1px solid rgba(15,118,110,.22);outline:none;border-radius:18px;background:var(--white);color:var(--teal-dark);padding:14px 18px;font:inherit;font-size:1.08rem}.searchbox:focus{border-color:var(--teal);box-shadow:0 0 0 5px rgba(15,118,110,.12)}.actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}button,.chip{border:0;border-radius:999px;padding:11px 16px;font:inherit;cursor:pointer;white-space:nowrap;transition:transform .18s,box-shadow .18s}.actions button{color:var(--white);background:linear-gradient(135deg,var(--teal-dark),var(--teal));box-shadow:0 12px 24px rgba(15,118,110,.18)}.actions button:nth-child(2){background:linear-gradient(135deg,var(--gold),var(--teal))}button:hover,.chip:hover,.chip.active{transform:translateY(-2px);box-shadow:0 18px 34px rgba(15,118,110,.18)}.chips{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:28px}.chip{color:var(--teal-dark);background:rgba(255,255,255,.86);border:1px solid rgba(15,118,110,.15);box-shadow:0 10px 24px rgba(7,59,54,.08)}.chip.active{color:var(--white);background:linear-gradient(135deg,var(--teal-dark),var(--teal))}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:18px}.month-card{grid-column:span 4;border-radius:var(--radius);border:1px solid var(--white);background:linear-gradient(145deg,rgba(255,255,255,.95),rgba(255,255,255,.78)),radial-gradient(circle at 14% 14%,rgba(15,118,110,.12),transparent 38%),radial-gradient(circle at 92% 10%,rgba(216,189,115,.18),transparent 34%);box-shadow:0 20px 48px rgba(7,59,54,.11);overflow:hidden;transition:transform .24s,box-shadow .24s;position:relative}.month-card:before{content:"";position:absolute;inset-inline-start:0;top:0;width:7px;height:100%;background:linear-gradient(180deg,var(--teal),var(--gold))}.month-card:after{content:"";position:absolute;top:14px;inset-inline-end:18px;width:42px;height:42px;background:var(--gold);opacity:.62;-webkit-mask:url('https://api.iconify.design/fa6-solid/mosque.svg') center/contain no-repeat;mask:url('https://api.iconify.design/fa6-solid/mosque.svg') center/contain no-repeat}.month-card:hover{transform:translateY(-7px);box-shadow:0 28px 70px rgba(7,59,54,.16)}.month-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:21px 23px;border-bottom:1px solid rgba(15,118,110,.10);background:linear-gradient(135deg,rgba(223,247,244,.86),rgba(255,243,207,.76))}.month-title{margin:0;font-size:1.38rem;color:var(--teal-dark)}.count{min-width:40px;height:40px;display:grid;place-items:center;border-radius:15px;background:linear-gradient(135deg,var(--teal),var(--gold));color:var(--white);font-weight:700}.events{list-style:none;padding:18px 23px 23px;margin:0;display:grid;gap:11px}.events li{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:start;padding:10px 0;border-bottom:1px dashed rgba(15,118,110,.14);line-height:1.65;font-size:1.08rem}.events li:last-child{border-bottom:0}.num{width:30px;height:30px;display:grid;place-items:center;border-radius:11px;background:linear-gradient(135deg,var(--teal-soft),var(--gold-soft));color:var(--teal-dark);font-size:.94rem;margin-top:2px;font-weight:700}mark{background:var(--gold-soft);color:var(--teal-dark);border-radius:7px;padding:0 4px}.empty{display:none;text-align:center;padding:34px;border-radius:var(--radius);background:rgba(255,255,255,.86);color:var(--teal);font-size:1.2rem;box-shadow:0 20px 48px rgba(7,59,54,.10)}.empty.show{display:block}@media(max-width:980px){.month-card{grid-column:span 6}}@media(max-width:680px){.page{width:min(100% - 18px,1200px);padding-top:12px}.hero{min-height:auto;padding:20px 0 18px}.toolbar{grid-template-columns:1fr;top:8px}.actions{justify-content:stretch}.actions button{flex:1}.month-card{grid-column:span 12}.chips{overflow-x:auto;flex-wrap:nowrap;padding-bottom:8px}.chip{flex:0 0 auto}}
</style>
</head>
<body>
<main class="page">
<section class="hero" aria-label="مقدمة الصفحة"><div class="hero-card"><div class="pattern-band"></div><div class="web-icons" aria-hidden="true"><span class="web-icon moon"></span><span class="web-icon gold mosque"></span><span class="web-icon star"></span></div><div class="basmala">بسم الله الرحمن الرحيم</div><div class="org"><span>المديرية العامة للأوقاف الإسلامية</span><span>في الجمهورية اللبنانية</span><span>دائرة أوقاف البقاع</span></div><h1>فهرس بأهم الحوادث المشهورة في السيرة النبوية والفتوحات الإسلامية</h1><div class="hero-line"></div></div></section>
<section class="toolbar" aria-label="أدوات الصفحة"><input id="searchInput" class="searchbox" type="search" placeholder="ابحث داخل الفهرس" autocomplete="off" /><div class="actions"><button id="clearBtn" type="button">مسح البحث</button><button type="button" onclick="window.print()">طباعة</button></div></section>
<nav id="chips" class="chips" aria-label="الأشهر"></nav><section id="cards" class="grid" aria-live="polite"></section><div id="empty" class="empty">لا توجد نتائج مطابقة</div>
</main>
<script>
const months=[{title:"شهر محرم",events:["الهجرة النبوية الشريفة","غزوة خيبر","عاشوراء ذكرى انتصار سيدنا موسى على فرعون","القادسية","فتح مصر"]},{title:"شهر صفر",events:["بعث الرجيع","سرية بئر معونة","بعث أسامة بن زيد"]},{title:"شهر ربيع الأول",events:["المولد النبوي الشريف","زواج النبي صلى الله عليه وسلم بالسيدة خديجة رضي الله عنها.","تجديد بناء الكعبة، والدور الذي قام به الأمين محمد صلى الله عليه وسلم.","وصول الرسول صلى الله عليه وسلم إلى المدينة يوم الاثنين آتياً من قباء.","غزوة بني النضير.","وفاة السيد إبراهيم بن رسول الله صلى الله عليه وسلم","وفاة الرسول صلى الله عليه وسلم.","فتح القدس."]},{title:"شهر ربيع الآخر",events:["وقعة حطين."]},{title:"جمادى الأولى",events:["عقد الزواج بين علي وفاطمة رضي الله عنهما.","سرية مؤتة."]},{title:"جمادى الآخرة",events:["سرية ذات السلاسل","وقعة اليرموك","فتح القسطنطينية."]},{title:"شهر رجب",events:["الهجرة الأولى إلى الحبشة","الإسراء والمعراج","غزوة تبوك","فتح دمشق","تحرير القدس من الصليبيين."]},{title:"شهر شعبان",events:["تحويل القبلة","غزوة بني المصطلق","عبور طارق بن زياد","وقعة بلاط الشهداء.","إقامة أول جمعة بعد تحرير القدس من الصليبيين."]},{title:"شهر رمضان",events:["بدء الوحي على الرسول صلى الله عليه وسلم.","نزول القرآن الكريم","غزوة بدر الكبرى.","فتح مكة.","فتح الأندلس.","فتح عمورية","وقعة عين جالوت."]},{title:"شهر شوال",events:["غزوة بني قينقاع","غزوة أحد","غزوة الخندق","غزوة حنين","زواج النبي صلى الله عليه وسلم بعائشة رضي الله عنها."]},{title:"شهر ذي القعدة",events:["غزوة بني قريظة.","أسر الحديبية."]},{title:"شهر ذي الحجة",events:["حجة أبي بكر الصديق رضي الله عنه بالمسلمين.","حجة الوداع."]}];
const cards=document.getElementById("cards"),chips=document.getElementById("chips"),searchInput=document.getElementById("searchInput"),clearBtn=document.getElementById("clearBtn"),empty=document.getElementById("empty");let activeMonth="الكل";function escapeRegExp(t){return t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")}function highlight(t,q){if(!q)return t;return t.replace(new RegExp(escapeRegExp(q),"gi"),m=>`<mark>${m}</mark>`)}function renderChips(){const names=["الكل",...months.map(m=>m.title)];chips.innerHTML=names.map(n=>`<button type="button" class="chip ${n===activeMonth?"active":""}" data-month="${n}">${n}</button>`).join("")}function renderCards(){const q=searchInput.value.trim();const filtered=months.filter(m=>activeMonth==="الكل"||m.title===activeMonth).map(m=>({...m,events:m.events.filter(e=>!q||`${m.title} ${e}`.includes(q))})).filter(m=>m.events.length>0||(!q&&activeMonth===m.title));cards.innerHTML=filtered.map(m=>`<article class="month-card" id="${m.title.replaceAll(" ","-")}"><header class="month-head"><h2 class="month-title">${highlight(m.title,q)}</h2><span class="count">${m.events.length}</span></header><ol class="events">${m.events.map((e,i)=>`<li><span class="num">${i+1}</span><span>${highlight(e,q)}</span></li>`).join("")}</ol></article>`).join("");empty.classList.toggle("show",filtered.length===0);renderChips()}chips.addEventListener("click",e=>{const b=e.target.closest("button[data-month]");if(!b)return;activeMonth=b.dataset.month;renderCards()});searchInput.addEventListener("input",renderCards);clearBtn.addEventListener("click",()=>{searchInput.value="";activeMonth="الكل";renderCards();searchInput.focus()});renderChips();renderCards();
</script>
</body>
</html>
