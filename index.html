<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فهرس بأهم الحوادث المشهورة</title>
  <style>
    :root {
      --ink: #10211f;
      --muted: #5f756f;
      --teal-900: #073b36;
      --teal-800: #0b4f49;
      --teal-700: #0f766e;
      --teal-500: #14a39a;
      --teal-100: #dff7f4;
      --gold-500: #d9b76a;
      --gold-300: #f1d99b;
      --gold-100: #fff4d6;
      --white: #ffffff;
      --paper: rgba(255, 255, 255, 0.86);
      --line: rgba(15, 118, 110, 0.18);
      --shadow: 0 26px 80px rgba(7, 59, 54, 0.16);
      --radius: 30px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Amiri", "Scheherazade New", "Noto Naskh Arabic", "Traditional Arabic", Tahoma, Arial, sans-serif;
      background:
        radial-gradient(circle at 12% 10%, rgba(20, 163, 154, .18), transparent 30%),
        radial-gradient(circle at 88% 14%, rgba(217, 183, 106, .28), transparent 28%),
        radial-gradient(circle at 18% 88%, rgba(15, 118, 110, .13), transparent 28%),
        linear-gradient(135deg, #f8fffe 0%, #eefbf8 46%, #fff8e8 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .56;
      background-image:
        repeating-linear-gradient(45deg, rgba(15,118,110,.055) 0 1px, transparent 1px 38px),
        repeating-linear-gradient(-45deg, rgba(217,183,106,.09) 0 1px, transparent 1px 38px),
        radial-gradient(circle at center, rgba(15,118,110,.07) 0 2px, transparent 2px 46px);
      mask-image: radial-gradient(circle at center, black 0%, transparent 86%);
    }

    body::after {
      content: "✦ ✧ ✦ ✧ ✦";
      position: fixed;
      inset-inline-start: 20px;
      top: 22px;
      writing-mode: vertical-rl;
      color: rgba(15, 118, 110, .16);
      font-size: 28px;
      letter-spacing: 18px;
      pointer-events: none;
    }

    .page {
      width: min(1200px, calc(100% - 30px));
      margin: 0 auto;
      padding: 34px 0 56px;
      position: relative;
      z-index: 1;
    }

    .hero {
      min-height: 58vh;
      display: grid;
      place-items: center;
      padding: 34px 12px;
      text-align: center;
    }

    .hero-card {
      width: min(960px, 100%);
      padding: clamp(30px, 5vw, 76px);
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 44px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.88), rgba(255,255,255,.68)),
        radial-gradient(circle at 18% 16%, rgba(20,163,154,.15), transparent 36%),
        radial-gradient(circle at 86% 86%, rgba(217,183,106,.24), transparent 36%);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: 18px;
      border-radius: 32px;
      border: 2px solid transparent;
      background:
        linear-gradient(white, white) padding-box,
        linear-gradient(135deg, var(--teal-700), var(--gold-300), var(--teal-500)) border-box;
      opacity: .62;
      z-index: -1;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: -45%;
      background:
        radial-gradient(circle, rgba(15,118,110,.08) 0 2px, transparent 2px 26px),
        linear-gradient(45deg, transparent 48%, rgba(217,183,106,.10) 49% 51%, transparent 52%);
      transform: rotate(12deg);
      z-index: -2;
    }

    .ornament {
      width: min(520px, 88%);
      height: 18px;
      margin: 0 auto 22px;
      background:
        radial-gradient(circle at center, var(--gold-500) 0 7px, transparent 8px),
        linear-gradient(90deg, transparent, var(--teal-700), var(--gold-300), var(--teal-700), transparent);
      border-radius: 999px;
      opacity: .95;
    }

    .basmala {
      display: inline-grid;
      place-items: center;
      padding: 10px 24px;
      border-radius: 999px;
      color: white;
      background: linear-gradient(135deg, var(--teal-800), var(--teal-700));
      box-shadow: 0 14px 28px rgba(15,118,110,.22);
      font-size: clamp(1.05rem, 2vw, 1.45rem);
      margin-bottom: 24px;
      letter-spacing: .02em;
    }

    .org {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-size: clamp(.98rem, 1.7vw, 1.2rem);
      margin-bottom: 30px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 6vw, 4.6rem);
      line-height: 1.25;
      color: var(--teal-900);
      text-wrap: balance;
      text-shadow: 0 2px 0 rgba(255,255,255,.7);
    }

    .hero-line {
      width: min(420px, 80%);
      height: 5px;
      margin: 32px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--teal-700), var(--gold-300), var(--teal-700));
      box-shadow: 0 12px 28px rgba(15,118,110,.16);
    }

    .toolbar {
      position: sticky;
      top: 12px;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 6px 0 24px;
      padding: 12px;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: 24px;
      background: rgba(255, 255, 255, .76);
      box-shadow: 0 18px 44px rgba(7,59,54,.12);
      backdrop-filter: blur(20px);
    }

    .searchbox {
      width: 100%;
      border: 1px solid rgba(15,118,110,.24);
      outline: none;
      border-radius: 18px;
      background: rgba(255,255,255,.88);
      color: var(--ink);
      padding: 14px 18px;
      font: inherit;
      font-size: 1.05rem;
    }

    .searchbox:focus {
      border-color: var(--teal-500);
      box-shadow: 0 0 0 5px rgba(20,163,154,.14);
    }

    .actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }

    button, .chip {
      border: 0;
      background: linear-gradient(135deg, var(--teal-800), var(--teal-700));
      color: white;
      border-radius: 999px;
      padding: 11px 16px;
      font: inherit;
      cursor: pointer;
      transition: transform .18s ease, filter .18s ease, box-shadow .18s ease;
      white-space: nowrap;
      box-shadow: 0 12px 24px rgba(15,118,110,.18);
    }

    button:nth-child(2) { background: linear-gradient(135deg, var(--gold-500), var(--teal-700)); }

    button:hover, .chip:hover, .chip.active {
      transform: translateY(-2px) scale(1.02);
      filter: saturate(1.08);
      box-shadow: 0 18px 34px rgba(15,118,110,.20);
    }

    .chips { display: flex; gap: 9px; flex-wrap: wrap; margin-bottom: 28px; }

    .chip {
      background: rgba(255,255,255,.76);
      color: var(--teal-800);
      border: 1px solid rgba(15,118,110,.16);
      box-shadow: 0 10px 24px rgba(7,59,54,.08);
    }

    .chip.active {
      color: white;
      background: linear-gradient(135deg, var(--teal-800), var(--teal-500));
    }

    .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 18px; }

    .month-card {
      grid-column: span 4;
      border: 1px solid rgba(255,255,255,.78);
      border-radius: var(--radius);
      background:
        linear-gradient(145deg, rgba(255,255,255,.92), rgba(255,255,255,.72)),
        radial-gradient(circle at 14% 14%, rgba(15,118,110,.13), transparent 38%),
        radial-gradient(circle at 92% 10%, rgba(217,183,106,.16), transparent 34%);
      box-shadow: 0 20px 48px rgba(7,59,54,.11);
      overflow: hidden;
      transition: transform .24s ease, box-shadow .24s ease;
      position: relative;
    }

    .month-card::before {
      content: "";
      position: absolute;
      inset-inline-start: 0;
      top: 0;
      width: 7px;
      height: 100%;
      background: linear-gradient(180deg, var(--teal-700), var(--gold-300));
    }

    .month-card::after {
      content: "✦";
      position: absolute;
      top: 12px;
      inset-inline-end: 18px;
      color: rgba(15,118,110,.18);
      font-size: 46px;
      line-height: 1;
    }

    .month-card:hover { transform: translateY(-7px); box-shadow: 0 28px 70px rgba(7,59,54,.16); }

    .month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 21px 23px;
      border-bottom: 1px solid rgba(15,118,110,.10);
      background: linear-gradient(135deg, rgba(223,247,244,.76), rgba(255,244,214,.62));
    }

    .month-title { margin: 0; font-size: 1.35rem; color: var(--teal-800); }

    .count {
      min-width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 15px;
      background: linear-gradient(135deg, var(--teal-700), var(--gold-500));
      color: white;
      font-weight: 700;
      box-shadow: 0 12px 24px rgba(15,118,110,.18);
    }

    .events { list-style: none; padding: 18px 23px 23px; margin: 0; display: grid; gap: 11px; }

    .events li {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(15,118,110,.14);
      line-height: 1.65;
      font-size: 1.08rem;
    }

    .events li:last-child { border-bottom: 0; }

    .num {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border-radius: 11px;
      background: linear-gradient(135deg, var(--teal-100), var(--gold-100));
      color: var(--teal-800);
      font-size: .93rem;
      margin-top: 2px;
      font-weight: 700;
    }

    mark { background: rgba(241, 217, 155, .72); color: inherit; border-radius: 7px; padding: 0 4px; }

    .empty {
      display: none;
      text-align: center;
      padding: 34px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(255,255,255,.78);
      color: var(--muted);
      font-size: 1.2rem;
      box-shadow: 0 20px 48px rgba(7,59,54,.10);
    }

    .empty.show { display: block; }

    @media (max-width: 980px) { .month-card { grid-column: span 6; } }
    @media (max-width: 680px) {
      .page { width: min(100% - 18px, 1200px); padding-top: 12px; }
      .hero { min-height: auto; padding: 20px 0 18px; }
      .toolbar { grid-template-columns: 1fr; top: 8px; }
      .actions { justify-content: stretch; }
      .actions button { flex: 1; }
      .month-card { grid-column: span 12; }
      .chips { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 8px; }
      .chip { flex: 0 0 auto; }
      body::after { display: none; }
    }

    @media print {
      body { background: white; }
      body::before, body::after, .toolbar, .chips { display: none; }
      .page { width: 100%; padding: 0; }
      .hero { min-height: auto; padding: 0 0 20px; }
      .hero-card, .month-card { box-shadow: none; background: white; border-color: #ddd; }
      .month-card { break-inside: avoid; grid-column: span 6; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="مقدمة الصفحة">
      <div class="hero-card">
        <div class="ornament"></div>
        <div class="hero-content">
          <div class="basmala">بسم الله الرحمن الرحيم</div>
          <div class="org">
            <span>المديرية العامة للأوقاف الإسلامية</span>
            <span>في الجمهورية اللبنانية</span>
            <span>دائرة أوقاف البقاع</span>
          </div>
          <h1>فهرس بأهم الحوادث المشهورة في السيرة النبوية والفتوحات الإسلامية</h1>
          <div class="hero-line"></div>
        </div>
      </div>
    </section>

    <section class="toolbar" aria-label="أدوات الصفحة">
      <input id="searchInput" class="searchbox" type="search" placeholder="ابحث داخل الفهرس" autocomplete="off" />
      <div class="actions">
        <button id="clearBtn" type="button">مسح البحث</button>
        <button type="button" onclick="window.print()">طباعة</button>
      </div>
    </section>

    <nav id="chips" class="chips" aria-label="الأشهر"></nav>
    <section id="cards" class="grid" aria-live="polite"></section>
    <div id="empty" class="empty">لا توجد نتائج مطابقة</div>
  </main>

  <script>
    const months = [
      { title: "شهر محرم", events: ["الهجرة النبوية الشريفة", "غزوة خيبر", "عاشوراء ذكرى انتصار سيدنا موسى على فرعون", "القادسية", "فتح مصر"] },
      { title: "شهر صفر", events: ["بعث الرجيع", "سرية بئر معونة", "بعث أسامة بن زيد"] },
      { title: "شهر ربيع الأول", events: ["المولد النبوي الشريف", "زواج النبي صلى الله عليه وسلم بالسيدة خديجة رضي الله عنها.", "تجديد بناء الكعبة، والدور الذي قام به الأمين محمد صلى الله عليه وسلم.", "وصول الرسول صلى الله عليه وسلم إلى المدينة يوم الاثنين آتياً من قباء.", "غزوة بني النضير.", "وفاة السيد إبراهيم بن رسول الله صلى الله عليه وسلم", "وفاة الرسول صلى الله عليه وسلم.", "فتح القدس."] },
      { title: "شهر ربيع الآخر", events: ["وقعة حطين."] },
      { title: "جمادى الأولى", events: ["عقد الزواج بين علي وفاطمة رضي الله عنهما.", "سرية مؤتة."] },
      { title: "جمادى الآخرة", events: ["سرية ذات السلاسل", "وقعة اليرموك", "فتح القسطنطينية."] },
      { title: "شهر رجب", events: ["الهجرة الأولى إلى الحبشة", "الإسراء والمعراج", "غزوة تبوك", "فتح دمشق", "تحرير القدس من الصليبيين."] },
      { title: "شهر شعبان", events: ["تحويل القبلة", "غزوة بني المصطلق", "عبور طارق بن زياد", "وقعة بلاط الشهداء.", "إقامة أول جمعة بعد تحرير القدس من الصليبيين."] },
      { title: "شهر رمضان", events: ["بدء الوحي على الرسول صلى الله عليه وسلم.", "نزول القرآن الكريم", "غزوة بدر الكبرى.", "فتح مكة.", "فتح الأندلس.", "فتح عمورية", "وقعة عين جالوت."] },
      { title: "شهر شوال", events: ["غزوة بني قينقاع", "غزوة أحد", "غزوة الخندق", "غزوة حنين", "زواج النبي صلى الله عليه وسلم بعائشة رضي الله عنها."] },
      { title: "شهر ذي القعدة", events: ["غزوة بني قريظة.", "أسر الحديبية."] },
      { title: "شهر ذي الحجة", events: ["حجة أبي بكر الصديق رضي الله عنه بالمسلمين.", "حجة الوداع."] }
    ];

    const cards = document.getElementById("cards");
    const chips = document.getElementById("chips");
    const searchInput = document.getElementById("searchInput");
    const clearBtn = document.getElementById("clearBtn");
    const empty = document.getElementById("empty");
    let activeMonth = "الكل";

    function escapeRegExp(text) { return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }
    function highlight(text, query) {
      if (!query) return text;
      const regex = new RegExp(escapeRegExp(query), "gi");
      return text.replace(regex, match => `<mark>${match}</mark>`);
    }

    function renderChips() {
      const names = ["الكل", ...months.map(month => month.title)];
      chips.innerHTML = names.map(name => `<button type="button" class="chip ${name === activeMonth ? "active" : ""}" data-month="${name}">${name}</button>`).join("");
    }

    function renderCards() {
      const query = searchInput.value.trim();
      const filtered = months
        .filter(month => activeMonth === "الكل" || month.title === activeMonth)
        .map(month => ({
          ...month,
          events: month.events.filter(event => !query || `${month.title} ${event}`.includes(query))
        }))
        .filter(month => month.events.length > 0 || (!query && activeMonth === month.title));

      cards.innerHTML = filtered.map(month => `
        <article class="month-card" id="${month.title.replaceAll(" ", "-")}">
          <header class="month-head">
            <h2 class="month-title">${highlight(month.title, query)}</h2>
            <span class="count">${month.events.length}</span>
          </header>
          <ol class="events">
            ${month.events.map((event, index) => `<li><span class="num">${index + 1}</span><span>${highlight(event, query)}</span></li>`).join("")}
          </ol>
        </article>
      `).join("");

      empty.classList.toggle("show", filtered.length === 0);
      renderChips();
    }

    chips.addEventListener("click", event => {
      const button = event.target.closest("button[data-month]");
      if (!button) return;
      activeMonth = button.dataset.month;
      renderCards();
    });

    searchInput.addEventListener("input", renderCards);
    clearBtn.addEventListener("click", () => {
      searchInput.value = "";
      activeMonth = "الكل";
      renderCards();
      searchInput.focus();
    });

    renderChips();
    renderCards();
  </script>
</body>
</html>
